<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corona Runner</title>
  <style>
    @font-face {
      font-family: "Jersey10";
      src: url("/assets/fonts/Jersey10-Regular.ttf") format("truetype");
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #f7f7f7;
      font-family: "Jersey10", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #476032;
    }
    h1 { font-size: 42px; margin: 12px 0 4px; letter-spacing: 1px; }
    #hint { font-size: 22px; margin: 0 0 14px; color: #68ad3e; }
    #stage {
      width: min(96vw, 1100px);
      background: #fff;
      border: 2px solid #dcdcdc;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }
    footer { font-size: 20px; margin: 14px 0; color: #999; }
  </style>
</head>
<body>
  <h1>Corona Runner</h1>
  <p id="hint">Press <b>Space</b> / <b>&uarr;</b> to jump &nbsp;·&nbsp; <b>&darr;</b> to duck</p>
  <div id="stage">
    <canvas id="game" width="1100" height="400"></canvas>
  </div>
  <footer>Tap the canvas on mobile to jump</footer>
  <script src="/static/game.js"></script>
</body>
</html>
